version: '3.9'

services:

  mysql:
    image: mysql:8
    container_name: rx_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: rxincredible

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - rxnetwork

  backend:
    build: ./backend
    container_name: rx_backend
    restart: always

    depends_on:
      - mysql

    environment:
      SERVER_PORT: 8081

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rxincredible?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

    ports:
      - "127.0.0.1:8081:8081"

    networks:
      - rxnetwork

  frontend:
    build: ./frontend
    container_name: rx_frontend
    restart: always

    depends_on:
      - backend

    ports:
      - "127.0.0.1:3000:80"

    networks:
      - rxnetwork

networks:
  rxnetwork:

volumes:
  mysql_data:
